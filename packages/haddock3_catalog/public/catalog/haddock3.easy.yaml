  description: HADDOCK3 gdock module.
  schema:
    type: object
    properties:
      ambig_fname:
        title: Ambiguous distance restraints filename
        description: Filename of the ambiguous distance restraints file
        $comment: Filename of the ambiguous distance restraints file. Restraints between
          the receptor and ligand chains are converted to residue pairs and used by
          gdock to bias the genetic algorithm search.
        type: string
        format: uri-reference
      max_generations:
        default: 250
        title: Maximum number of generations
        description: Maximum number of genetic algorithm generations.
        $comment: Maximum number of genetic algorithm generations run by gdock.
        type: number
        maximum: 100000
        minimum: 1
      number_of_individuals:
        default: 150
        title: Number of individuals
        description: Number of individuals in the GA population.
        $comment: Number of individuals (chromosomes) in each generation of gdock's
          genetic algorithm. Larger populations explore the conformational space more
          broadly but increase runtime proportionally.
        type: number
        maximum: 100000
        minimum: 1
      seed:
        default: 42
        title: Random seed
        description: Random seed used by gdock's genetic algorithm.
        $comment: Random seed used by gdock's genetic algorithm, for reproducibility.
        type: number
        maximum: 999999999
        minimum: 0
      sampling:
        default: 1000
        title: Number of maximum models to generate
        description: Maximum number of unique conformations gdock collects per input
          model.
        $comment: Controls gdock's Hall-of-Fame capacity. gdock accumulates up to
          this many unique conformations during the genetic algorithm run and returns
          them all sorted by fitness.
        type: number
        maximum: 500000
        minimum: 1
    required: []
    additionalProperties: false
  uiSchema:
    ambig_fname:
      ui:widget: file
      ui:group: distance restraints
    max_generations:
      ui:group: sampling
    number_of_individuals:
      ui:group: sampling
    seed:
      ui:group: sampling
    sampling:
      ui:group: sampling
  tomlSchema: {}
- id: ilrmsdmatrix
  category: analysis
  label: ilRMSD matrix module.
  description: HADDOCK3 module for clustering with RMSD.
  schema:
    type: object
    properties:
      receptor_chain:
        default: A
        title: Receptor ChainID
        description: Receptor ChainID to be considered for the RMSD calculations.
        $comment: Receptor ChainID to be considered for the RMSD calculations. This
          determines which chain will be treated as the receptor for the L-RMSD and
          for I-L-RMSD.
        type: string
        minLength: 1
        maxLength: 1
        format: chain
      ligand_chains:
        default: []
        title: Ligand ChainIDs
        description: Ligand ChainIDs to be considered for the IL-RMSD calculations.
        $comment: Ligand ChainIDs to be considered for the IL-RMSD calculations. This
          determines which chains will be treated as the ligand for the IL-RMSD. By
          default, all chains are considered with the exception of the receptor chain.
        type: array
        minItems: 0
        maxItems: 100
        items:
          type: string
          format: chain
      atom_similarity:
        default: 90.0
        title: Required atom similarity
        description: Required similarity (in %) between the number of atoms in the
          input models.
        $comment: Required similarity (in %) between the number of atoms in the input
          models. If the similarity is higher than this value, the RMSD calculation
          is performed on the common atoms. Otherwise, the calculation is stopped.
          The lower the value the looser the checks.
        type: number
        maximum: 100.0
        minimum: 10.0
      allatoms:
        default: false
        title: Atoms to be considered during the analysis.
        description: Atoms to be considered during the analysis.
        $comment: Atoms to be considered during the analysis. If false (default),
          only backbone atoms will be considered, otherwise all the heavy-atoms.
        type: boolean
      contact_distance_cutoff:
        default: 5.0
        title: Distance cutoff defining a contact.
        description: Cutoff distance (in Angstrom) defining a contact.
        $comment: Distance (in Angstrom) cutoff defining a contact. Any atoms within
          this cutoff range will be used to define the interface. Standard values
          are usually 3.9 A or 5.0 A.
        type: number
        maximum: 30.0
        minimum: 0.1
    required: []
    additionalProperties: false
  uiSchema:
    receptor_chain:
      ui:group: analysis
    ligand_chains:
      ui:group: analysis
    atom_similarity:
      ui:group: analysis
    allatoms:
      ui:group: analysis
    contact_distance_cutoff:
      ui:group: analysis
  tomlSchema: {}
