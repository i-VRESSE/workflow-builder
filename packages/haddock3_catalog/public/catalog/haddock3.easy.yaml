global:
  schema:
    type: object
    properties:
      run_dir:
        title: Run directory
        description: Folder to store the HADDOCK3 run
        $comment: The new folder that will be created to save the HADDOCK3 run
        type: string
        format: uri-reference
      molecules:
        title: Input Molecules
        description: The input molecules that will be used for docking.
        $comment: Molecules must be provided in PDB format. These PDB files can be
          single molecules or ensembles using the MODEL/ENDMDL statements.
        type: array
        minItems: 1
        maxItems: 20
        items:
          type: string
          format: uri-reference
        format: moleculefilepaths
      preprocess:
        default: false
        title: Tries to correct input PDBs
        description: If true, evaluates and tries to correct the input PDB before
          the workflow.
        $comment: HADDOCK3 checks and processes the input PDB files to ensure they
          all comply with HADDOCK3's requirements. These checks concerns, for example,
          residue numbering, compatibility of chain IDs, and many others. You can
          see all checks performs in the live issue https://github.com/haddocking/haddock3/issues/143.
          If set to false, no checks are performed and HADDOCK3 directly uses the
          original input PDBs.
        type: boolean
      postprocess:
        default: true
        title: Executes haddock3-analyse on the CAPRI folders at the end of the run
        description: If true, executes haddock3-analyse on the CAPRI folders at the
          end of the workflow
        $comment: haddock3-analyse is a cli (see https://github.com/haddocking/haddock3/blob/main/src/haddock/clis/cli_analyse.py)
          used to plot the results of a HADDOCK3 workflow. If this option, this command
          is automatically executed at the end of the workflow (on the caprieval folders).
        type: boolean
      gen_archive:
        default: false
        title: Generates an archive of the run and of the analysis.
        description: If true, executes haddock3-analyse in self_contained mode and
          generates archives of the run_directory and of the analysis in two separated
          tgz files.
        $comment: If true, executes haddock3-analyse in self_contained mode and generates
          archives of the run_directory and of the analysis in two separated tgz files.
        type: boolean
      cns_exec:
        title: Path to the CNS executable
        description: If not provided, HADDOCK3 will use the cns path configured during
          the installation.
        $comment: CNS is a required component to run HADDOCK. Ideally it should have
          been configured during installation. If not you can specify with the cns_exec
          parameter its path.
        type: string
        format: uri-reference
      ncores:
        default: 4
        title: Number of CPU cores
        description: Number of CPU cores to use for the CNS calculations. It is truncated
          to max available CPUs  minus 1.
        $comment: Number of CPU cores to use for the CNS calculations. This will define
          the number of concurrent jobs being executed. Note that is truncated to
          the total number of available CPUs minus 1.
        type: number
        maximum: 500
        minimum: 1
      mode:
        default: local
        title: Mode of execution
        description: Mode of execution of the jobs, either local or using a batch
          system.
        $comment: Mode of execution of the jobs, either local or using a batch system.
          Currently slurm and torque are supported. For the batch mode the queue command
          must be specified in the queue parameter.
        type: string
        minLength: 0
        maxLength: 20
        enum:
        - local
        - batch
      batch_type:
        default: slurm
        title: Batch system
        description: Type of batch system running on your server
        $comment: Type of batch system running on your server. Only slurm and torque
          are supported at this time
        type: string
        minLength: 0
        maxLength: 100
        enum:
        - slurm
        - torque
      queue:
        title: Queue name
        description: Name of the batch queue to which jobs will be submitted
        $comment: Name of the batch queue to which jobs will be submitted. If not
          defined the batch system default will be used.
        type: string
        minLength: 0
        maxLength: 100
      queue_limit:
        default: 100
        title: Number of jobs to submit to the batch system
        description: Number of jobs to submit to the batch system
        $comment: This parameter controls the number of jobs that will be submitted
          to the batch system. In combination with the concat parameter this allow
          to limit the load on the queueing system and also make sure jobs remain
          in the queue for some time (if concat > 1) to avoid high system loads on
          the batch system.
        type: number
        maximum: 9999
        minimum: 1
      concat:
        default: 1
        title: Number of models to produce per job.
        description: Multiple models can be calculated within one job
        $comment: This defines the number of models that will be generated within
          on job script. This allows to concatenate the generation of models into
          one script. In that way jobs might run longer in the batch system and reduce
          the load on the scheduler.
        type: number
        maximum: 9999
        minimum: 1
      clean:
        default: true
        title: Clean the module output files.
        description: Clean the module if run succeeds by compressing or removing output
          files.
        $comment: When running haddock through the command-line, the 'clean' parameter
          will instruct the workflow to clean the output files of the module if the
          whole run succeeds. In this process, PDB and PSF files are compressed to
          gzip, with the extension `.gz`. While files with extension `.seed`, `.inp`,
          and `.out` files are archived, and the original files deleted. The time
          to perform a cleaning operation depends on the number of files in the folders
          and the size of the files. However, it should not represent a limit step
          in the workflow. For example, a rigidbody sampling 10,000 structures takes
          about 4 minutes in our servers. This operation uses as many cores as allowed
          by the user in the 'ncores' parameter. SSD disks will perform faster by
          definition. See also the 'haddock3-clean' and 'haddock3-unpack' command-line
          clients.
        type: boolean
      offline:
        default: false
        title: Isolate haddock3 from internet.
        description: Completely isolate the haddock3 run & results from internet.
        $comment: For interactive plots, we are using the plotly library. It can be
          embedded as a link to the plotly.js library and fetched from the web, or
          directly copied on the html files AT THE COST OF ~3Mb per file. Setting
          this parameter to `true` will add the javascript library in generated files,
          therefore completely isolating haddock3 from any web call.
        type: boolean
    required:
    - run_dir
    if:
      properties:
        mode:
          const: batch
    then: {}
    else:
      properties:
        debug:
          default: false
          title: Write intermediate and stdout files.
          description: Write intermediate and stdout files.
          $comment: When set to true, this option will increase the amount of I/O
            operations by writing intermediate input, output and error files on disk.
            Turning it to false can be useful for example when running on a network
            file system where I/O operations are slow.
          type: boolean
  uiSchema:
    molecules:
      items:
        ui:widget: file
        ui:options:
          accept: .pdb
      ui:indexable: true
    cns_exec:
      ui:widget: file
      ui:group: execution
    ncores:
      ui:group: execution
    mode:
      ui:group: execution
    batch_type:
      ui:group: execution
    queue:
      ui:group: execution
    queue_limit:
      ui:group: execution
    concat:
      ui:group: execution
    clean:
      ui:group: clean
    offline:
      ui:group: execution
    debug:
      ui:group: execution
  tomlSchema: {}
nodes:
- id: alascan
  category: analysis
  label: HADDOCK3 module for alanine scan.
  description: HADDOCK3 module for alanine scan.
  schema:
    type: object
    properties:
      int_cutoff:
        default: 5.0
        title: "Distance cutoff (\xC5) used to define interface contacts."
        description: "Distance cutoff (\xC5) used to define interface contacts between\
          \ two interacting molecules."
        $comment: "Distance cutoff (\xC5) used to define interface contacts between\
          \ two interacting molecules."
        type: number
        maximum: 20.0
        minimum: 1.0
      output_bfactor:
        default: false
        title: Dump the input models with the rescaled delta_score written in the
          b-factor column.
        description: Dump the input models with the rescaled delta_score written in
          the b-factor column.
        $comment: Dump the input models with the rescaled delta_score written in the
          b-factor column. Those files do not contain the mutations, but rather will
          display the normalized (between 0 and 100) delta HADDOCK score (100 * (delta_score
          - min_score) / (max_score - min_score)) in the b-factor column. The higher
          the b-factor, the more favourable (or less unfavourable) the mutation. You
          can color the PDB files according to this attribute (in pymol, type "spectrum
          b")
        type: boolean
      scan_residue:
        default: ALA
        title: Residue to be used for the scanning
        description: Residue to be used for the scanning. The default is alanine.
        $comment: Residue to be used for the scanning. The default is alanine. Use
          bigger residues at your own risk.
        type: string
        minLength: 3
        maxLength: 3
        enum:
        - ALA
        - ARG
        - ASN
        - ASP
        - CYS
        - GLN
        - GLU
        - GLY
        - HIS
        - ILE
        - LEU
        - LYS
        - MET
        - PHE
        - PRO
        - SER
        - THR
        - TRP
        - TYR
        - VAL
        - ALY
        - ASH
        - CFE
        - CSP
        - CYC
        - CYF
        - CYM
        - DDZ
        - GLH
        - HLY
        - HY3
        - HYP
        - M3L
        - MLY
        - MLZ
        - MSE
        - NEP
        - PNS
        - PTR
        - SEP
        - TOP
        - TYP
        - TYS
        - CIR
      plot:
        default: false
        title: Plot scanning data.
        description: Plot scanning data.
        $comment: Plot scanning data.
        type: boolean
      chains:
        default: []
        title: ChainIDs to be considered for the scanning.
        description: ChainIDs to be considered for the scanning.
        $comment: ChainIDs to be considered for the scanning. If empty, all the chains
          will be considered. If not empty, only residues part of the specified chains
          will be mutated. Do not use this parameter if you are using the resdic_*
          parameter.
        type: array
        minItems: 0
        maxItems: 10
        items:
          type: string
          format: chain
      output_mutants:
        default: false
        title: Dump the mutated, energy-minimized PDB files.
        description: Dump the mutated, energy-minimized PDB files.
        $comment: Dump the mutated, energy-minimized PDB files. As the number of mutants
          can be very large, this option is allowed only when a single model is provided
          in input.
        type: boolean
      ligand_param_fname:
        title: Custom ligand parameter file
        description: Ligand parameter file in CNS format
        $comment: Ligand parameter file in CNS format, for any ligand/residues/molecules
          not supported by default by HADDOCK.
        type: string
        format: uri-reference
      ligand_top_fname:
        title: Custom ligand topology file
        description: Ligand topology file in CNS format
        $comment: Ligand topology file in CNS format containing the ligand topologies
          (atoms, masses, charges, bond definitions...) for any ligand not supported
          by default by HADDOCK
        type: string
        format: uri-reference
    required: []
    additionalProperties: false
  uiSchema:
    int_cutoff:
      ui:group: analysis
    output_bfactor:
      ui:group: analysis
    scan_residue:
      ui:group: analysis
    plot:
      ui:group: analysis
    chains:
      ui:group: analysis
    output_mutants:
      ui:group: analysis
    ligand_param_fname:
      ui:widget: file
      ui:group: force field
    ligand_top_fname:
      ui:widget: file
      ui:group: force field
  tomlSchema: {}
- id: caprieval
  category: analysis
  label: Calculate CAPRI metrics for the input models.
  description: HADDOCK3 module to calculate the CAPRI metrics.
  schema:
    type: object
    properties:
      reference_fname:
        title: Reference structure
        description: Structure to be used when calculating the CAPRI metrics.
        $comment: Reference tructure to be used when calculating the CAPRI metrics.
          If none is defined then the lowest scoring model is selected by default.
        type: string
        format: uri-reference
      irmsd:
        default: true
        title: Calculate I-RMSD
        description: Performs Interface RMSD calculations.
        $comment: Calculates the Interface Root Mean Square Deviation. This calculate
          the RMSD of interface backbone atoms after fitting on the interface backbone
          atoms. The interface is idenfied based on intermolecular contacts shorter
          than the defined irmsd_cutoff.
        type: boolean
      fnat:
        default: true
        title: Calculate FNAT
        description: Performs FNAT calculations.
        $comment: Calculates the Fraction of Native Contacts. This evaluates how many
          contacts observed in the reference are present in the model. The distance
          cutoff used to define intermolecular contacts is defined by the fnat_cutoff
          parameter.
        type: boolean
      lrmsd:
        default: true
        title: Calculate L-RMSD
        description: Performs Ligand RMSD calculations.
        $comment: Calculates the Ligand Root Mean Square Deviation. This calculation
          is done by superimposing the receptors (defined by the receptor_chain parameter)
          and then evaluating the RMSD on the ligands (defined by the ligand_chains
          parameter). Superposition and RMSD calculations are done on backbone heavy
          atoms.
        type: boolean
      ilrmsd:
        default: true
        title: Calculate I-L-RMSD
        description: Performs Interface Ligand RMSD calculations.
        $comment: Calculates the Interface Ligand Root Mean Square Deviation. This
          calculation is done by superimposing the model and the target on the interface
          backbone atoms of the receptor (defined by the receptor_chain parameter)
          and calculating the RMSD on all heavy atoms of the ligand (defined by the
          ligand_chains parameter).
        type: boolean
      dockq:
        default: true
        title: Calculate DockQ
        description: Evaluate DockQ.
        $comment: Evaluate DockQ. A single continuous quality measure for protein
          docked models based on the CAPRI criteria, a combination of i-RMSD, l-RMSD
          and FNAT value. For details check the DockQ publication `DOI:10.1371/journal.pone.0161879`
        type: boolean
      global_rmsd:
        default: true
        title: Calculate global RMSD
        description: Calculate full structure RMSD.
        $comment: Compute full structure RMSD between reference structure and the
          model after superimposition. Note that a sequence alignment is performed
          to obtain the mapping between the reference and the model. If the one of
          the structure contain a 'small-molecule', we assume that the compared structure
          atoms are in the same order. With default parameters `allatoms = false`,
          only backbone RMSD will be computed.
        type: boolean
      irmsd_cutoff:
        default: 10.0
        title: "Distance cutoff (\xC5) used to define interface residues."
        description: "Distance cutoff (\xC5) used to define interface residues based\
          \ on intermolecular contacts."
        $comment: "Distance cutoff (\xC5) used to define interface residues based\
          \ on intermolecular contacts."
        type: number
        maximum: 20.0
        minimum: 3.0
      fnat_cutoff:
        default: 5.0
        title: "Distance cutoff (\xC5) used to define interface contacts."
        description: "Distance cutoff (\xC5) used to define interface contacts between\
          \ two interacting molecules."
        $comment: "Distance cutoff (\xC5) used to define interface contacts between\
          \ two interacting molecules."
        type: number
        maximum: 20.0
        minimum: 3.0
      receptor_chain:
        default: A
        title: Receptor ChainID
        description: Receptor ChainID to be considered for the RMSD calculations.
        $comment: Receptor ChainID to be considered for the RMSD calculations. This
          determines which chain will be treated as the receptor for the L-RMSD and
          for I-L-RMSD.
        type: string
        minLength: 1
        maxLength: 1
        format: chain
      ligand_chains:
        default: []
        title: Ligand ChainIDs
        description: Ligand ChainIDs to be considered for the RMSD calculations.
        $comment: Ligand ChainIDs to be considered for the RMSD calculations. This
          determines which chains will be treated as the ligand for the L-RMSD and
          for I-L-RMSD.
        type: array
        minItems: 0
        maxItems: 100
        items:
          type: string
          format: chain
      sortby:
        default: score
        title: Sort the structures/clusters in the output file by this value
        description: Which value should be used to sort the output.
        $comment: Which value should be used to sort the output, the output table
          will be sorted accordingly.
        type: string
        minLength: 0
        maxLength: 20
        enum:
        - score
        - irmsd
        - lrmsd
        - ilrmsd
        - fnat
        - dockq
      sort_ascending:
        default: true
        title: Sort in ascending order
        description: Sort in ascending order.
        $comment: Sort in ascending order.
        type: boolean
      alignment_method:
        default: sequence
        title: Alignment method used to match the numbering.
        description: Which alignment method should be used to match the numbering.
        $comment: Alignment method used to match the numbering. Sequence alignment
          is haddock3-friendly but might not produce best results for structures that
          are too different, for that use
        type: string
        minLength: 0
        maxLength: 100
        enum:
        - structure
        - sequence
      lovoalign_exec:
        title: Location (path) of the LovoAlign executable
        description: Location (path) of the LovoAlign executable.
        $comment: Location (path) of the LovoAlign executable.
        type: string
        minLength: 0
        maxLength: 200
      clt_threshold:
        default: 4
        title: Threshold (n) used for the average evaluation in the cluster-based
          output
        description: Threshold (n) used for the average evaluation in the cluster-based
          output.
        $comment: Threshold (n) used for the average evaluation in the cluster-based
          output.
        type: number
        maximum: 1000
        minimum: 1
      allatoms:
        default: false
        title: Atoms to be considered during the analysis.
        description: Atoms to be considered during the analysis.
        $comment: Atoms to be considered during the analysis. If false (default),
          only backbone atoms will be considered, otherwise all the heavy-atoms.
        type: boolean
      keep_hetatm:
        default: false
        title: HETATM to be considered during the analysis.
        description: HETATM to be considered during the analysis.
        $comment: HETATM to be considered during the analysis. If false (default),
          only ATOM coordinates lines will be used, otherwise the HETATM from reference
          will also be used.
        type: boolean
    required: []
    additionalProperties: false
  uiSchema:
    reference_fname:
      ui:widget: file
      ui:group: analysis
    irmsd:
      ui:group: analysis
    fnat:
      ui:group: analysis
    lrmsd:
      ui:group: analysis
    ilrmsd:
      ui:group: analysis
    dockq:
      ui:group: analysis
    global_rmsd:
      ui:group: analysis
    irmsd_cutoff:
      ui:group: analysis
    fnat_cutoff:
      ui:group: analysis
    receptor_chain:
      ui:group: analysis
    ligand_chains:
      ui:group: analysis
    sortby:
      ui:group: analysis
    sort_ascending:
      ui:group: analysis
    alignment_method:
      ui:group: analysis
    lovoalign_exec:
      ui:group: analysis
    clt_threshold:
      ui:group: analysis
    allatoms:
      ui:group: analysis
    keep_hetatm:
      ui:group: analysis
  tomlSchema: {}
- id: caprifilter
  category: analysis
  label: Filter models by any combination of CAPRI metrics computed against a reference
    structure.
  description: HADDOCK3 module to filter models by CAPRI metrics.
  schema:
    type: object
    properties:
      reference_fname:
        title: Reference structure
        description: Reference structure for CAPRI metric calculation.
        $comment: Path to the reference PDB structure used to calculate CAPRI metrics.
          This parameter is mandatory, the module will stop with an error if reference
          not found.
        type: string
        format: uri-reference
      filter_by:
        default:
        - rmsd
        title: Metrics to filter by.
        description: List of CAPRI metrics to use for filtering.
        $comment: List of CAPRI metrics to filter on. Valid values are rmsd, irmsd,
          lrmsd, ilrmsd, fnat, dockq. Each metric must have its corresponding {metric}_filter_cutoff
          and {metric}_filter_out parameters set. All filters are applied simultaneously
          (AND logic), so a model must pass every active filter to be kept.
        type: array
        minItems: 1
        maxItems: 6
        items:
          type: string
      rmsd_filter_cutoff:
        default: 10.0
        title: "RMSD filter cutoff (\xC5)."
        description: Filtering threshold for RMSD.
        $comment: Filtering threshold for RMSD.
        type: number
        maximum: 99999.99
        minimum: 0.0
      rmsd_filter_out:
        default: above
        title: RMSD filtering direction.
        description: Filter out models with RMSD above or below the cutoff.
        $comment: if 'above' - filter out models that are over the cutoff value (rmsd_filter_cutoff).
          if 'below' - filter out models with rmsd under the cutoff value (rmsd_filter_cutoff).
        type: string
        minLength: 1
        maxLength: 10
        enum:
        - above
        - below
      irmsd_filter_cutoff:
        default: 5.0
        title: "iRMSD filter cutoff (\xC5)."
        description: Filtering threshold for interface-RMSD.
        $comment: Filtering threshold for interface-RMSD.
        type: number
        maximum: 99999.99
        minimum: 0.0
      irmsd_filter_out:
        default: above
        title: iRMSD filtering direction.
        description: Filter out models with iRMSD above or below the cutoff.
        $comment: if 'above' - filter out models that are over the cutoff value (irmsd_filter_cutoff).
          if 'below' - filter out models with irmsd under the cutoff value (irmsd_filter_cutoff).
        type: string
        minLength: 1
        maxLength: 10
        enum:
        - above
        - below
      lrmsd_filter_cutoff:
        default: 10.0
        title: "lRMSD filter cutoff (\xC5)."
        description: Filtering threshold for ligand-RMSD
        $comment: Filtering threshold for ligand-RMSD.
        type: number
        maximum: 99999.99
        minimum: 0.0
      lrmsd_filter_out:
        default: above
        title: lRMSD filtering direction.
        description: Filter out models with lRMSD above or below the cutoff.
        $comment: if 'above' - filter out models that are over the cutoff value (lrmsd_filter_cutoff).
          if 'below' - filter out models with lRMSD under the cutoff value (lrmsd_filter_cutoff).
        type: string
        minLength: 1
        maxLength: 10
        enum:
        - above
        - below
      ilrmsd_filter_cutoff:
        default: 10.0
        title: "ilRMSD filter cutoff (\xC5)."
        description: Filtering threshold for interface-ligand-RMSD.
        $comment: Filtering threshold for interface-ligand-RMSD.
        type: number
        maximum: 99999.99
        minimum: 0.0
      ilrmsd_filter_out:
        default: above
        title: ilRMSD filtering direction.
        description: Filter out models with ilRMSD above or below the cutoff.
        $comment: if 'above' - filter out models that are over the cutoff value (ilrmsd_filter_cutoff).
          if 'below' - filter out models with ilRMSD under the cutoff value (ilrmsd_filter_cutoff).
        type: string
        minLength: 1
        maxLength: 10
        enum:
        - above
        - below
      fnat_filter_cutoff:
        default: 0.3
        title: FNAT filter cutoff.
        description: Filtering threshold for fraction of native contacts.
        $comment: Filtering threshold for fraction of native contacts.
        type: number
        maximum: 1.0
        minimum: 0.0
      fnat_filter_out:
        default: below
        title: FNAT filtering direction.
        description: Filter out models with FNAT above or below the cutoff.
        $comment: if 'above' - filter out models that are over the cutoff value (fnat_filter_cutoff).
          if 'below' - filter out models with FNAT under the cutoff value (fnat_filter_cutoff).
        type: string
        minLength: 1
        maxLength: 10
        enum:
        - above
        - below
      dockq_filter_cutoff:
        default: 0.23
        title: DockQ filter cutoff.
        description: Filtering threshold for DockQ.
        $comment: Filtering threshold for DockQ.
        type: number
        maximum: 1.0
        minimum: 0.0
      dockq_filter_out:
        default: below
        title: DockQ filtering direction.
        description: Filter out models with DockQ above or below the cutoff.
        $comment: if 'above' - filter out models that are over the cutoff value (dockq_filter_cutoff).
          if 'below' - filter out models with DockQ under the cutoff value (dockq_filter_cutoff).
        type: string
        minLength: 1
        maxLength: 10
        enum:
        - above
        - below
      irmsd_cutoff:
        default: 10.0
        title: "Distance cutoff (\xC5) used to define interface residues."
        description: "Distance cutoff (\xC5) used to define interface residues."
        $comment: "Distance cutoff (\xC5) used to define interface residues based\
          \ on intermolecular contacts."
        type: number
        maximum: 20.0
        minimum: 3.0
      fnat_cutoff:
        default: 5.0
        title: "Distance cutoff (\xC5) used to define interface contacts."
        description: "Distance cutoff (\xC5) used to define interface contacts."
        $comment: "Distance cutoff (\xC5) used to define interface contacts between\
          \ two interacting molecules."
        type: number
        maximum: 20.0
        minimum: 3.0
      receptor_chain:
        default: A
        title: Receptor ChainID
        description: Receptor ChainID for RMSD calculations.
        $comment: Receptor ChainID to be considered for the lRMSD and ilRMSD calculations.
        type: string
        minLength: 1
        maxLength: 1
        format: chain
      ligand_chains:
        default: []
        title: Ligand ChainIDs
        description: Ligand ChainIDs for RMSD calculations.
        $comment: Ligand ChainIDs to be considered for the lRMSD and ilRMSD calculations.
        type: array
        minItems: 0
